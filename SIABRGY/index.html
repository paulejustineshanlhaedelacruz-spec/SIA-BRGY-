<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barangay DIPS - Document Issuance and Processing System</title>
    <link rel="stylesheet" href="src/styles/global.css">
    <link rel="stylesheet" href="src/styles/dashboard.css">
    <link rel="stylesheet" href="src/styles/document-issuance.css">
    <link rel="stylesheet" href="src/styles/components.css">
</head>
<body>
    <!-- root container for React -->
    <div id="root">Loading application...</div>
    
    <!-- React and ReactDOM from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/react-dom.production.min.js"></script>
    
    <!-- application script -->
    <script src="src/index.js"></script>
    
    <!-- debugging helper and fallback if React fails to load -->
    <script>

            console.error('React or ReactDOM not available, inserting static fallback');

                    <div class="sidebar-logo">BD</div>

                </div>
                <div class="main-content">

                        <div class="header-left">
                            <div class="header-title">Barangay DIPS</div>

                        </div>

                        </div>

                        </div>
                        <div class="stat-cards-grid">
                            <div class="stat-card">

                            </div>
                            <div class="stat-card cyan">

                                <p></p>
                            </div>
                            <div class="stat-card green">
                                <h3>Pending Request</h3>
                                <div class="stat-card-value">8</div>
                                <p></p>
                            </div>
                            <div class="stat-card pink">
                                <h3>Flagged Residents</h3>
                                <div class="stat-card-value">2</div>
                                <p>2 restricted</p>
                            </div>
                        </div>
                        <div style="display:grid;grid-template-columns:1fr 350px;gap:var(--spacing-lg);">

                                <div class="dashboard-section">
                                    <div class="section-header">
                                        <h2 class="section-title">Revenue Trend</h2>
                                        <select class="input-field" style="width:120px;"><option>Last 7 months</option></select>
                                    </div>
                                    <div class="chart-container" style="height:200px;">Line Chart Placeholder</div>
                                </div>

                                    <div class="section-header">
                                        <h2 class="section-title">Document Type Distribution</h2>
                                        <select class="input-field" style="width:120px;"><option>2 months</option></select>
                                    </div>
                                    <div class="chart-container" style="height:200px;">Pie Chart Placeholder</div>
                                </div>
                            </div>
                            <div>

                                        <div class="activity-item"><div class="activity-icon danger">⚠️</div><div class="activity-content"><p class="activity-title">Sofia Dizon attempted Business Permit — RESTRICTED</p><p class="activity-time">2/01/2026</p></div></div>

                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>`;
        } else {
            console.log('React and ReactDOM loaded successfully');
        }
    </script>
</body>
</html>
